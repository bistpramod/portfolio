# This runs automatically every time you push to the main branch.
# GitHub builds your React app into plain HTML/JS/CSS, then publishes
# those finished files — so visitors never download raw .tsx source code.

name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you re-deploy manually from the Actions tab

permissions:
  contents: write # needed so the action can push the built site to gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Grab your latest code from GitHub
      - name: Grab the code
        uses: actions/checkout@v4

      # Install Node.js (same as running npm on your laptop)
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Download all the packages listed in package.json
      - name: Install packages
        run: npm ci

      # Turn React/TypeScript into normal files browsers understand
      - name: Build the site
        run: npm run build

      # Upload the built site to the gh-pages branch
      # GitHub Pages then serves THOSE files — not the raw src/ folder
      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
